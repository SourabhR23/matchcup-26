services:
  - type: cron
    name: wc2026-match-collector
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/pipeline.py --cron
    envVars:
      - key: BSD_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
