services:
  - type: web
    name: wc2026-match-collector
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/pipeline.py --serve --interval 300
    envVars:
      - key: BSD_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
